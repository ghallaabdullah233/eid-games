<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة الأعلام</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --amber:#FFB703;
      --sky:#D7F0F5;
      --barbie:#FF76B7;
      --lavender:#E2C6FE;
      --peach:#FFA981;
      --grape:#9E1F63;
      --pastel:#FFD3F7;
      --white:#ffffff;
      --text:#6b1450;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Cairo', sans-serif;
      background:linear-gradient(180deg, var(--sky), var(--pastel), var(--lavender));
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      padding:30px 16px;
    }

    .decor-circle{
      position:fixed;
      border-radius:50%;
      opacity:0.35;
      filter:blur(8px);
      z-index:0;
    }

    .c1{
      width:220px;
      height:220px;
      background:var(--amber);
      top:-40px;
      right:-50px;
    }

    .c2{
      width:180px;
      height:180px;
      background:var(--barbie);
      bottom:-30px;
      left:-40px;
    }

    .stars span,
    .sparkles span,
    .balloons span{
      position:fixed;
      user-select:none;
      pointer-events:none;
      z-index:0;
    }

    .stars span{
      font-size:28px;
      animation:twinkle 3s infinite ease-in-out;
    }

    .sparkles span{
      font-size:20px;
      animation:twinkle 2.5s infinite ease-in-out;
    }

    .balloons span{
      font-size:50px;
      animation:floatUp 6s infinite ease-in-out;
      opacity:0.9;
    }

    .star1{ top:8%; right:12%; color:var(--amber); }
    .star2{ top:18%; left:12%; color:var(--barbie); }
    .star3{ bottom:18%; right:15%; color:var(--grape); }
    .star4{ bottom:12%; left:10%; color:var(--peach); }

    .spark1{ top:30%; right:22%; color:var(--barbie); }
    .spark2{ top:36%; left:24%; color:var(--amber); }
    .spark3{ bottom:28%; left:30%; color:var(--grape); }

    .balloon1{ top:10%; left:6%; }
    .balloon2{ top:12%; right:7%; }
    .balloon3{ bottom:8%; left:9%; }

    .page{
      position:relative;
      z-index:2;
      max-width:1150px;
      margin:auto;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-family:'Cairo', sans-serif;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:0.25s;
      box-shadow:0 8px 18px rgba(0,0,0,0.10);
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.03);
    }

    .btn-back{
      background:var(--amber);
      color:white;
    }

    .btn-next{
      background:var(--barbie);
      color:white;
    }

    .game-card{
      background:rgba(255,255,255,0.40);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:2px solid rgba(255,255,255,0.55);
      border-radius:32px;
      padding:30px 20px 35px;
      box-shadow:0 15px 40px rgba(158,31,99,0.15);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    h1{
      font-family:'Aref Ruqaa', serif;
      font-size:clamp(2.4rem, 6vw, 4.5rem);
      color:var(--grape);
      margin-bottom:12px;
      text-shadow:0 3px 0 var(--white), 0 8px 20px rgba(255,183,3,0.30);
    }

    .sub{
      color:var(--text);
      font-size:22px;
      font-weight:800;
      margin-bottom:18px;
    }

    .main-layout{
      display:grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap:24px;
      align-items:start;
    }

    .flag-section{
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:22px;
      box-shadow:0 10px 25px rgba(158,31,99,0.10);
    }

    .level-badge{
      width:fit-content;
      margin:0 auto 16px;
      background:#fff6fc;
      color:var(--grape);
      font-size:17px;
      font-weight:900;
      padding:10px 18px;
      border-radius:18px;
      box-shadow:0 8px 18px rgba(158,31,99,0.10);
    }

    .flag-box{
      width:100%;
      max-width:520px;
      margin:0 auto 20px;
      background:white;
      border-radius:26px;
      padding:18px;
      box-shadow:0 12px 28px rgba(158,31,99,0.10);
    }

    .flag-box img{
      width:100%;
      height:280px;
      object-fit:cover;
      border-radius:18px;
      display:block;
    }

    .flag-name{
      display:none;
      margin:18px auto 0;
      background:#fff6fc;
      color:var(--grape);
      font-size:22px;
      font-weight:900;
      padding:14px 18px;
      border-radius:20px;
      width:fit-content;
      max-width:100%;
      box-shadow:0 10px 20px rgba(158,31,99,0.10);
    }

    .flag-name.show{
      display:block;
      animation:popIn 0.35s ease;
    }

    .flag-controls{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .btn-reveal{
      background:var(--peach);
      color:white;
    }

    .score-section{
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:22px 18px 26px;
      box-shadow:0 10px 25px rgba(158,31,99,0.10);
    }

    .score-title{
      color:var(--grape);
      font-size:24px;
      font-weight:900;
      margin-bottom:20px;
    }

    .mountain-area{
      height:320px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:24px;
      margin-bottom:20px;
      padding:10px 0;
    }

    .team-mountain-wrap{
      width:140px;
      text-align:center;
    }

    .mountain-value{
      font-size:28px;
      font-weight:900;
      color:var(--grape);
      margin-bottom:10px;
    }

    .mountain{
      width:100%;
      height:90px;
      clip-path:polygon(50% 0%, 100% 100%, 0% 100%);
      transition:height 0.5s ease;
      position:relative;
      box-shadow:0 10px 25px rgba(158,31,99,0.15);
    }

    .mountain::after{
      content:"";
      position:absolute;
      top:8px;
      left:50%;
      transform:translateX(-50%);
      width:26px;
      height:18px;
      background:rgba(255,255,255,0.8);
      clip-path:polygon(50% 0%, 100% 100%, 0% 100%);
    }

    .mountain.x{
      background:linear-gradient(180deg, #ffd66e, var(--amber));
    }

    .mountain.o{
      background:linear-gradient(180deg, #ff9ad0, var(--barbie));
    }

    .mountain-label{
      margin-top:14px;
      font-size:22px;
      font-weight:900;
      color:var(--grape);
    }

    .score-buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:16px;
    }

    .score-card{
      background:rgba(255,255,255,0.82);
      border-radius:22px;
      padding:16px 12px;
      box-shadow:0 10px 20px rgba(158,31,99,0.10);
    }

    .team-name{
      color:var(--grape);
      font-size:20px;
      font-weight:900;
      margin-bottom:12px;
    }

    .mini-actions{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .mini-btn{
      border:none;
      border-radius:999px;
      padding:9px 14px;
      font-family:'Cairo', sans-serif;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:0.25s;
    }

    .mini-btn:hover{
      transform:scale(1.05);
    }

    .plus-x{
      background:var(--amber);
      color:white;
    }

    .plus-o{
      background:var(--barbie);
      color:white;
    }

    .minus-btn{
      background:#f3e5ef;
      color:var(--grape);
    }

    .bottom-actions{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn-reset-points{
      background:var(--lavender);
      color:var(--grape);
    }

    .btn-reset-game{
      background:var(--grape);
      color:white;
    }

    @keyframes twinkle{
      0%,100%{ transform:scale(1); opacity:0.8; }
      50%{ transform:scale(1.22); opacity:1; }
    }

    @keyframes floatUp{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-18px); }
    }

    @keyframes popIn{
      from{
        opacity:0;
        transform:scale(0.8);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @media (max-width:900px){
      .main-layout{
        grid-template-columns:1fr;
      }

      .mountain-area{
        height:280px;
      }
    }

    @media (max-width:600px){
      .top-bar{
        justify-content:center;
      }

      .flag-box img{
        height:210px;
      }

      .sub{
        font-size:18px;
      }

      .mountain-area{
        gap:14px;
      }

      .team-mountain-wrap{
        width:120px;
      }

      .score-buttons{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="decor-circle c1"></div>
  <div class="decor-circle c2"></div>

  <div class="stars">
    <span class="star1">✦</span>
    <span class="star2">★</span>
    <span class="star3">✦</span>
    <span class="star4">★</span>
  </div>

  <div class="sparkles">
    <span class="spark1">✧</span>
    <span class="spark2">✧</span>
    <span class="spark3">✧</span>
  </div>

  <div class="balloons">
    <span class="balloon1">🎈</span>
    <span class="balloon2">🎈</span>
    <span class="balloon3">🎈</span>
  </div>

  <div class="page">
    <div class="top-bar">
      <a class="btn btn-next" href="#" onclick="nextFlag(); return false;">علم جديد 🚩</a>
      <a class="btn btn-back" href="الواجهة.html">رجوع للواجهة ✨</a>
    </div>

    <div class="game-card">
      <h1>لعبة الأعلام</h1>
      <p class="sub">نشوف من ثقافته أفضل 🤓</p>

      <div class="main-layout">
        <div class="flag-section">
          <div class="level-badge" id="levelBadge">المستوى الحالي: سهل</div>

          <div class="flag-box">
            <img id="flagImage" src="" alt="علم دولة">
          </div>

          <div class="flag-name" id="flagName"></div>

          <div class="flag-controls">
            <button class="btn btn-reveal" onclick="revealAnswer()">إظهار الإجابة 👀</button>
            <button class="btn btn-next" onclick="nextFlag()">التالي ➜</button>
          </div>
        </div>

        <div class="score-section">
          <div class="score-title">لوحة النقاط ⛰️</div>

          <div class="mountain-area">
            <div class="team-mountain-wrap">
              <div class="mountain-value" id="scoreXText">0</div>
              <div class="mountain x" id="mountainX"></div>
              <div class="mountain-label">فريق X</div>
            </div>

            <div class="team-mountain-wrap">
              <div class="mountain-value" id="scoreOText">0</div>
              <div class="mountain o" id="mountainO"></div>
              <div class="mountain-label">فريق O</div>
            </div>
          </div>

          <div class="score-buttons">
            <div class="score-card">
              <div class="team-name">نقاط فريق X</div>
              <div class="mini-actions">
                <button class="mini-btn plus-x" onclick="addPoint('X')">+1 نقطة</button>
                <button class="mini-btn minus-btn" onclick="removePoint('X')">-1</button>
              </div>
            </div>

            <div class="score-card">
              <div class="team-name">نقاط فريق O</div>
              <div class="mini-actions">
                <button class="mini-btn plus-o" onclick="addPoint('O')">+1 نقطة</button>
                <button class="mini-btn minus-btn" onclick="removePoint('O')">-1</button>
              </div>
            </div>
          </div>

          <div class="bottom-actions">
            <button class="btn btn-reset-points" onclick="resetScores()">تصفير النقاط 🪄</button>
            <button class="btn btn-reset-game" onclick="restartFlags()">إعادة الأعلام 🎯</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const easyFlags = [
      { name: "السعودية", image: "https://flagcdn.com/w640/sa.png" },
      { name: "الإمارات", image: "https://flagcdn.com/w640/ae.png" },
      { name: "الكويت", image: "https://flagcdn.com/w640/kw.png" },
      { name: "قطر", image: "https://flagcdn.com/w640/qa.png" },
      { name: "البحرين", image: "https://flagcdn.com/w640/bh.png" },
      { name: "عمان", image: "https://flagcdn.com/w640/om.png" },
      { name: "مصر", image: "https://flagcdn.com/w640/eg.png" },
      { name: "الأردن", image: "https://flagcdn.com/w640/jo.png" },
      { name: "فرنسا", image: "https://flagcdn.com/w640/fr.png" },
      { name: "ألمانيا", image: "https://flagcdn.com/w640/de.png" },
      { name: "تركيا", image: "https://flagcdn.com/w640/tr.png" },
      { name: "المغرب", image: "https://flagcdn.com/w640/ma.png" }
    ];

    const mediumFlags = [
      { name: "الجزائر", image: "https://flagcdn.com/w640/dz.png" },
      { name: "تونس", image: "https://flagcdn.com/w640/tn.png" },
      { name: "باكستان", image: "https://flagcdn.com/w640/pk.png" },
      { name: "ماليزيا", image: "https://flagcdn.com/w640/my.png" },
      { name: "إندونيسيا", image: "https://flagcdn.com/w640/id.png" },
      { name: "أذربيجان", image: "https://flagcdn.com/w640/az.png" },
      { name: "كازاخستان", image: "https://flagcdn.com/w640/kz.png" },
      { name: "أوكرانيا", image: "https://flagcdn.com/w640/ua.png" },
      { name: "السويد", image: "https://flagcdn.com/w640/se.png" },
      { name: "النرويج", image: "https://flagcdn.com/w640/no.png" },
      { name: "المكسيك", image: "https://flagcdn.com/w640/mx.png" },
      { name: "الأرجنتين", image: "https://flagcdn.com/w640/ar.png" }
    ];

    let currentLevel = "easy";
    let currentFlags = [];
    let currentFlagIndex = 0;
    let scoreX = 0;
    let scoreO = 0;

    const flagImage = document.getElementById("flagImage");
    const flagName = document.getElementById("flagName");
    const mountainX = document.getElementById("mountainX");
    const mountainO = document.getElementById("mountainO");
    const scoreXText = document.getElementById("scoreXText");
    const scoreOText = document.getElementById("scoreOText");
    const levelBadge = document.getElementById("levelBadge");

    function shuffleArray(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function loadCurrentLevel(){
      currentFlags = currentLevel === "easy" ? [...easyFlags] : [...mediumFlags];
      shuffleArray(currentFlags);
      currentFlagIndex = 0;
      levelBadge.textContent = currentLevel === "easy" ? "المستوى الحالي: سهل" : "المستوى الحالي: متوسط";
      showFlag();
    }

    function showFlag(){
      const currentFlag = currentFlags[currentFlagIndex];
      flagImage.src = currentFlag.image;
      flagName.textContent = "هذا علم: " + currentFlag.name;
      flagName.classList.remove("show");
    }

    function revealAnswer(){
      flagName.classList.add("show");
    }

    function nextFlag(){
      currentFlagIndex++;

      if(currentFlagIndex >= currentFlags.length){
        if(currentLevel === "easy"){
          currentLevel = "medium";
          loadCurrentLevel();
          return;
        } else {
          shuffleArray(currentFlags);
          currentFlagIndex = 0;
        }
      }

      showFlag();
    }

    function restartFlags(){
      currentLevel = "easy";
      loadCurrentLevel();
    }

    function addPoint(team){
      if(team === "X"){
        scoreX++;
      }else{
        scoreO++;
      }
      updateScores();
    }

    function removePoint(team){
      if(team === "X" && scoreX > 0){
        scoreX--;
      }else if(team === "O" && scoreO > 0){
        scoreO--;
      }
      updateScores();
    }

    function updateScores(){
      scoreXText.textContent = scoreX;
      scoreOText.textContent = scoreO;

      const heightX = 90 + (scoreX * 18);
      const heightO = 90 + (scoreO * 18);

      mountainX.style.height = heightX + "px";
      mountainO.style.height = heightO + "px";
    }

    function resetScores(){
      scoreX = 0;
      scoreO = 0;
      updateScores();
    }

    loadCurrentLevel();
    updateScores();
  </script>

</body>
</html>
