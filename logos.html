<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة الشعارات</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --amber:#FFB703;
      --sky:#D7F0F5;
      --barbie:#FF76B7;
      --lavender:#E2C6FE;
      --peach:#FFA981;
      --grape:#9E1F63;
      --pastel:#FFD3F7;
      --white:#ffffff;
      --text:#6b1450;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Cairo', sans-serif;
      background:linear-gradient(180deg, var(--sky), var(--pastel), var(--lavender));
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      padding:30px 16px;
    }

    .decor-circle{
      position:fixed;
      border-radius:50%;
      opacity:0.35;
      filter:blur(8px);
      z-index:0;
    }

    .c1{
      width:220px;
      height:220px;
      background:var(--amber);
      top:-40px;
      right:-50px;
    }

    .c2{
      width:180px;
      height:180px;
      background:var(--barbie);
      bottom:-30px;
      left:-40px;
    }

    .stars span,
    .sparkles span,
    .balloons span{
      position:fixed;
      user-select:none;
      pointer-events:none;
      z-index:0;
    }

    .stars span{
      font-size:28px;
      animation:twinkle 3s infinite ease-in-out;
    }

    .sparkles span{
      font-size:20px;
      animation:twinkle 2.5s infinite ease-in-out;
    }

    .balloons span{
      font-size:50px;
      animation:floatUp 6s infinite ease-in-out;
      opacity:0.9;
    }

    .star1{ top:8%; right:12%; color:var(--amber); }
    .star2{ top:18%; left:12%; color:var(--barbie); }
    .star3{ bottom:18%; right:15%; color:var(--grape); }
    .star4{ bottom:12%; left:10%; color:var(--peach); }

    .spark1{ top:30%; right:22%; color:var(--barbie); }
    .spark2{ top:36%; left:24%; color:var(--amber); }
    .spark3{ bottom:28%; left:30%; color:var(--grape); }

    .balloon1{ top:10%; left:6%; }
    .balloon2{ top:12%; right:7%; }
    .balloon3{ bottom:8%; left:9%; }

    .page{
      position:relative;
      z-index:2;
      max-width:1150px;
      margin:auto;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-family:'Cairo', sans-serif;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:0.25s;
      box-shadow:0 8px 18px rgba(0,0,0,0.10);
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.03);
    }

    .btn-back{
      background:var(--amber);
      color:white;
    }

    .btn-next{
      background:var(--barbie);
      color:white;
    }

    .btn-reveal{
      background:var(--peach);
      color:white;
    }

    .btn-reset-points{
      background:var(--grape);
      color:white;
    }

    .game-card{
      background:rgba(255,255,255,0.40);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:2px solid rgba(255,255,255,0.55);
      border-radius:32px;
      padding:30px 20px 35px;
      box-shadow:0 15px 40px rgba(158,31,99,0.15);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    h1{
      font-family:'Aref Ruqaa', serif;
      font-size:clamp(2.4rem, 6vw, 4.5rem);
      color:var(--grape);
      margin-bottom:12px;
      text-shadow:0 3px 0 var(--white), 0 8px 20px rgba(255,183,3,0.30);
    }

    .sub{
      color:var(--text);
      font-size:22px;
      font-weight:800;
      margin-bottom:18px;
    }

    .main-layout{
      display:grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap:24px;
      align-items:start;
    }

    .logo-section{
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:22px;
      box-shadow:0 10px 25px rgba(158,31,99,0.10);
    }

    .level-badge{
      width:fit-content;
      margin:0 auto 12px;
      background:#fff6fc;
      color:var(--grape);
      font-size:17px;
      font-weight:900;
      padding:10px 18px;
      border-radius:18px;
      box-shadow:0 8px 18px rgba(158,31,99,0.10);
    }

    .category-badge{
      width:fit-content;
      margin:0 auto 18px;
      background:rgba(255,255,255,0.85);
      color:#7d2f60;
      font-size:15px;
      font-weight:800;
      padding:8px 16px;
      border-radius:18px;
      box-shadow:0 8px 16px rgba(158,31,99,0.08);
    }

    .logo-box{
      width:100%;
      max-width:520px;
      margin:0 auto 20px;
      background:white;
      border-radius:26px;
      padding:18px;
      box-shadow:0 12px 28px rgba(158,31,99,0.10);
      min-height:340px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo-box img{
      width:100%;
      max-width:300px;
      max-height:220px;
      object-fit:contain;
      display:block;
      border-radius:18px;
      filter:grayscale(1) brightness(0);
    }

    .answer-box{
      display:none;
      margin:18px auto 0;
      background:#fff6fc;
      color:var(--grape);
      font-size:22px;
      font-weight:900;
      padding:14px 18px;
      border-radius:20px;
      width:fit-content;
      max-width:100%;
      box-shadow:0 10px 20px rgba(158,31,99,0.10);
      line-height:1.8;
    }

    .answer-box.show{
      display:block;
      animation:popIn 0.35s ease;
    }

    .logo-controls{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    .score-section{
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:22px 18px 26px;
      box-shadow:0 10px 25px rgba(158,31,99,0.10);
    }

    .score-title{
      color:var(--grape);
      font-size:24px;
      font-weight:900;
      margin-bottom:14px;
    }

    .leader-card{
      background:rgba(255,255,255,0.78);
      border-radius:24px;
      padding:16px;
      box-shadow:0 10px 22px rgba(158,31,99,0.08);
      margin-bottom:22px;
    }

    .lead-text{
      font-size:22px;
      font-weight:900;
      color:var(--grape);
    }

    .arena{
      height:320px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:28px;
      margin-bottom:20px;
      padding:10px 0;
    }

    .team-column-wrap{
      width:160px;
      text-align:center;
    }

    .score-top{
      font-size:42px;
      font-weight:900;
      color:var(--grape);
      margin-bottom:10px;
      transition:0.3s;
    }

    .column-track{
      height:220px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:12px;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,0.4);
    }

    .team-column{
      width:100%;
      height:70px;
      border-radius:24px 24px 12px 12px;
      transition:height 0.45s ease, transform 0.3s ease, box-shadow 0.3s ease;
      position:relative;
      overflow:hidden;
    }

    .team-column::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:28%;
      background:rgba(255,255,255,0.25);
      border-radius:24px 24px 0 0;
    }

    .team-column.first{
      background:linear-gradient(180deg, #ffd971, var(--amber));
      box-shadow:0 10px 24px rgba(255,183,3,0.20);
    }

    .team-column.second{
      background:linear-gradient(180deg, #ff9fd3, var(--barbie));
      box-shadow:0 10px 24px rgba(255,118,183,0.20);
    }

    .team-column.leader{
      transform:translateY(-8px) scale(1.03);
      box-shadow:0 0 0 6px rgba(255,255,255,0.45), 0 16px 30px rgba(158,31,99,0.18);
    }

    .team-label{
      margin-top:14px;
      font-size:22px;
      font-weight:900;
      color:var(--grape);
    }

    .scores-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .score-card{
      background:rgba(255,255,255,0.82);
      border-radius:24px;
      padding:18px 14px;
      box-shadow:0 10px 20px rgba(158,31,99,0.10);
      transition:0.3s;
    }

    .score-card.first-team{
      border:2px solid rgba(255,183,3,0.40);
    }

    .score-card.second-team{
      border:2px solid rgba(255,118,183,0.40);
    }

    .score-card.active{
      transform:translateY(-4px);
      box-shadow:0 0 0 5px rgba(255,255,255,0.45), 0 14px 24px rgba(158,31,99,0.15);
    }

    .team-name{
      color:var(--grape);
      font-size:22px;
      font-weight:900;
      margin-bottom:8px;
    }

    .score-actions{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .mini-btn{
      border:none;
      border-radius:999px;
      padding:9px 14px;
      font-family:'Cairo', sans-serif;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:0.25s;
    }

    .mini-btn:hover{
      transform:scale(1.05);
    }

    .plus-first{
      background:var(--amber);
      color:white;
    }

    .plus-second{
      background:var(--barbie);
      color:white;
    }

    .minus-btn{
      background:#f3e5ef;
      color:var(--grape);
    }

    .bottom-tools{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    @keyframes twinkle{
      0%,100%{ transform:scale(1); opacity:0.8; }
      50%{ transform:scale(1.22); opacity:1; }
    }

    @keyframes floatUp{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-18px); }
    }

    @keyframes popIn{
      from{
        opacity:0;
        transform:scale(0.85);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @media (max-width:900px){
      .main-layout{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:600px){
      .top-bar{
        justify-content:center;
      }

      .logo-box{
        min-height:240px;
      }

      .sub{
        font-size:18px;
      }

      .scores-grid{
        grid-template-columns:1fr;
      }

      .arena{
        gap:16px;
      }

      .team-column-wrap{
        width:130px;
      }

      .score-top{
        font-size:36px;
      }
    }
  </style>
</head>
<body>

  <div class="decor-circle c1"></div>
  <div class="decor-circle c2"></div>

  <div class="stars">
    <span class="star1">✦</span>
    <span class="star2">★</span>
    <span class="star3">✦</span>
    <span class="star4">★</span>
  </div>

  <div class="sparkles">
    <span class="spark1">✧</span>
    <span class="spark2">✧</span>
    <span class="spark3">✧</span>
  </div>

  <div class="balloons">
    <span class="balloon1">🎈</span>
    <span class="balloon2">🎈</span>
    <span class="balloon3">🎈</span>
  </div>

  <div class="page">
    <div class="top-bar">
      <a class="btn btn-next" href="#" onclick="nextLogo(); return false;">شعار جديد ✨</a>
      <a class="btn btn-back" href="الواجهة.html">رجوع للواجهة ✨</a>
    </div>

    <div class="game-card">
      <h1>لعبة الشعارات</h1>
      <p class="sub">نشوف مين عنده ذاكرة بصرية أقوى 😏</p>

      <div class="main-layout">
        <div class="logo-section">
          <div class="level-badge" id="levelBadge">المستوى الحالي: سهل</div>
          <div class="category-badge" id="categoryBadge">بدون تلميحات 😏</div>

          <div class="logo-box">
            <img id="logoImage" src="" alt="شعار">
          </div>

          <div class="answer-box" id="answerBox"></div>

          <div class="logo-controls">
            <button class="btn btn-reveal" onclick="revealAnswer()">إظهار الإجابة 👀</button>
            <button class="btn btn-next" onclick="nextLogo()">التالي ➜</button>
          </div>
        </div>

        <div class="score-section">
          <div class="score-title">لوحة النقاط 🎯</div>

          <div class="leader-card">
            <div class="lead-text" id="leadText">التعادل قائم 🤝</div>
          </div>

          <div class="arena">
            <div class="team-column-wrap">
              <div class="score-top" id="scoreFirst">0</div>
              <div class="column-track">
                <div class="team-column first" id="columnFirst"></div>
              </div>
              <div class="team-label">الفريق الأول</div>
            </div>

            <div class="team-column-wrap">
              <div class="score-top" id="scoreSecond">0</div>
              <div class="column-track">
                <div class="team-column second" id="columnSecond"></div>
              </div>
              <div class="team-label">الفريق الثاني</div>
            </div>
          </div>

          <div class="scores-grid">
            <div class="score-card first-team" id="cardFirst">
              <div class="team-name">الفريق الأول</div>
              <div class="score-actions">
                <button class="mini-btn plus-first" onclick="addPoint('first')">+1 نقطة</button>
                <button class="mini-btn minus-btn" onclick="removePoint('first')">-1</button>
              </div>
            </div>

            <div class="score-card second-team" id="cardSecond">
              <div class="team-name">الفريق الثاني</div>
              <div class="score-actions">
                <button class="mini-btn plus-second" onclick="addPoint('second')">+1 نقطة</button>
                <button class="mini-btn minus-btn" onclick="removePoint('second')">-1</button>
              </div>
            </div>
          </div>

          <div class="bottom-tools">
            <button class="btn btn-reset-points" onclick="resetScores()">تصفير النقاط 🪄</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const easyLogos = [
      { name: "Apple", category: "تقنية", image: "https://cdn.simpleicons.org/apple" },
      { name: "Nike", category: "رياضة", image: "https://cdn.simpleicons.org/nike" },
      { name: "Adidas", category: "رياضة", image: "https://cdn.simpleicons.org/adidas" },
      { name: "McDonald's", category: "مطاعم", image: "https://cdn.simpleicons.org/mcdonalds" },
      { name: "Shell", category: "طاقة", image: "https://cdn.simpleicons.org/shell" },
      { name: "Target", category: "تسوق", image: "https://cdn.simpleicons.org/target" },
      { name: "Chrome", category: "تقنية", image: "https://cdn.simpleicons.org/googlechrome" },
      { name: "Android", category: "تقنية", image: "https://cdn.simpleicons.org/android" }
    ];

    const mediumLogos = [
      { name: "PlayStation", category: "ألعاب", image: "https://cdn.simpleicons.org/playstation" },
      { name: "Xbox", category: "ألعاب", image: "https://cdn.simpleicons.org/xbox" },
      { name: "Starbucks", category: "مقاهي", image: "https://cdn.simpleicons.org/starbucks" },
      { name: "Puma", category: "رياضة", image: "https://cdn.simpleicons.org/puma" },
      { name: "Chanel", category: "أزياء", image: "https://cdn.simpleicons.org/chanel" },
      { name: "Pepsi", category: "مشروبات", image: "https://cdn.simpleicons.org/pepsi" },
      { name: "Mercedes-Benz", category: "سيارات", image: "https://cdn.simpleicons.org/mercedes" },
      { name: "Toyota", category: "سيارات", image: "https://cdn.simpleicons.org/toyota" }
    ];

    const hardLogos = [
      { name: "Pinterest", category: "منصات", image: "https://cdn.simpleicons.org/pinterest" },
      { name: "Discord", category: "منصات وألعاب", image: "https://cdn.simpleicons.org/discord" },
      { name: "Reddit", category: "منصات", image: "https://cdn.simpleicons.org/reddit" },
      { name: "Beats", category: "صوتيات", image: "https://cdn.simpleicons.org/beatsbydre" },
      { name: "Airbnb", category: "سفر", image: "https://cdn.simpleicons.org/airbnb" },
      { name: "Alienware", category: "تقنية وألعاب", image: "https://cdn.simpleicons.org/alienware" },
      { name: "Dropbox", category: "تقنية", image: "https://cdn.simpleicons.org/dropbox" },
      { name: "Dribbble", category: "تصميم", image: "https://cdn.simpleicons.org/dribbble" }
    ];

    const veryHardLogos = [
      { name: "Twitch", category: "بث وألعاب", image: "https://cdn.simpleicons.org/twitch" },
      { name: "Steam", category: "ألعاب", image: "https://cdn.simpleicons.org/steam" },
      { name: "Spotify", category: "موسيقى", image: "https://cdn.simpleicons.org/spotify" },
      { name: "TikTok", category: "منصات", image: "https://cdn.simpleicons.org/tiktok" },
      { name: "Maserati", category: "سيارات", image: "https://cdn.simpleicons.org/maserati" },
      { name: "Fendi", category: "أزياء", image: "https://cdn.simpleicons.org/fendi" },
      { name: "Kappa", category: "ملابس", image: "https://cdn.simpleicons.org/kappa" },
      { name: "Firefox", category: "تقنية", image: "https://cdn.simpleicons.org/firefoxbrowser" }
    ];

    let currentLevel = "easy";
    let currentList = [];
    let currentIndex = 0;

    let scoreFirst = 0;
    let scoreSecond = 0;

    const logoImage = document.getElementById("logoImage");
    const answerBox = document.getElementById("answerBox");
    const levelBadge = document.getElementById("levelBadge");
    const categoryBadge = document.getElementById("categoryBadge");

    const scoreFirstText = document.getElementById("scoreFirst");
    const scoreSecondText = document.getElementById("scoreSecond");
    const columnFirst = document.getElementById("columnFirst");
    const columnSecond = document.getElementById("columnSecond");
    const leadText = document.getElementById("leadText");
    const cardFirst = document.getElementById("cardFirst");
    const cardSecond = document.getElementById("cardSecond");

    function shuffleArray(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function loadCurrentLevel(){
      if(currentLevel === "easy"){
        currentList = [...easyLogos];
        levelBadge.textContent = "المستوى الحالي: سهل";
      } else if(currentLevel === "medium"){
        currentList = [...mediumLogos];
        levelBadge.textContent = "المستوى الحالي: متوسط";
      } else if(currentLevel === "hard"){
        currentList = [...hardLogos];
        levelBadge.textContent = "المستوى الحالي: صعب";
      } else {
        currentList = [...veryHardLogos];
        levelBadge.textContent = "المستوى الحالي: صعب جدًا";
      }

      shuffleArray(currentList);
      currentIndex = 0;
      showLogo();
    }

    function showLogo(){
      const currentLogo = currentList[currentIndex];
      logoImage.src = currentLogo.image;
      answerBox.innerHTML = `الإجابة: ${currentLogo.name}<br>المجال: ${currentLogo.category}`;
      categoryBadge.textContent = "بدون تلميحات 😏";
      answerBox.classList.remove("show");
    }

    function revealAnswer(){
      answerBox.classList.add("show");
    }

    function nextLogo(){
      currentIndex++;

      if(currentIndex >= currentList.length){
        if(currentLevel === "easy"){
          currentLevel = "medium";
          loadCurrentLevel();
          return;
        } else if(currentLevel === "medium"){
          currentLevel = "hard";
          loadCurrentLevel();
          return;
        } else if(currentLevel === "hard"){
          currentLevel = "veryHard";
          loadCurrentLevel();
          return;
        } else {
          shuffleArray(currentList);
          currentIndex = 0;
        }
      }

      showLogo();
    }

    function addPoint(team){
      if(team === "first"){
        scoreFirst++;
      } else {
        scoreSecond++;
      }
      updateScores();
    }

    function removePoint(team){
      if(team === "first" && scoreFirst > 0){
        scoreFirst--;
      } else if(team === "second" && scoreSecond > 0){
        scoreSecond--;
      }
      updateScores();
    }

    function resetScores(){
      scoreFirst = 0;
      scoreSecond = 0;
      updateScores();
    }

    function updateScores(){
      scoreFirstText.textContent = scoreFirst;
      scoreSecondText.textContent = scoreSecond;

      const firstHeight = 70 + (scoreFirst * 16);
      const secondHeight = 70 + (scoreSecond * 16);

      columnFirst.style.height = firstHeight + "px";
      columnSecond.style.height = secondHeight + "px";

      columnFirst.classList.remove("leader");
      columnSecond.classList.remove("leader");
      cardFirst.classList.remove("active");
      cardSecond.classList.remove("active");

      if(scoreFirst > scoreSecond){
        leadText.textContent = "الفريق الأول متقدم 🔥";
        columnFirst.classList.add("leader");
        cardFirst.classList.add("active");
      } else if(scoreSecond > scoreFirst){
        leadText.textContent = "الفريق الثاني متقدم 🔥";
        columnSecond.classList.add("leader");
        cardSecond.classList.add("active");
      } else {
        leadText.textContent = "التعادل قائم 🤝";
      }
    }

    loadCurrentLevel();
    updateScores();
  </script>
