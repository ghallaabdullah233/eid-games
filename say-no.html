<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قول بس لا تقول</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --amber:#FFB703;
      --sky:#D7F0F5;
      --barbie:#FF76B7;
      --lavender:#E2C6FE;
      --peach:#FFA981;
      --grape:#9E1F63;
      --pastel:#FFD3F7;
      --white:#ffffff;
      --text:#6b1450;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Cairo', sans-serif;
      background:linear-gradient(180deg, var(--sky), var(--pastel), var(--lavender));
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      padding:30px 16px;
    }

    .decor-circle{
      position:fixed;
      border-radius:50%;
      opacity:0.35;
      filter:blur(8px);
      z-index:0;
    }

    .c1{
      width:220px;
      height:220px;
      background:var(--amber);
      top:-40px;
      right:-50px;
    }

    .c2{
      width:180px;
      height:180px;
      background:var(--barbie);
      bottom:-30px;
      left:-40px;
    }

    .stars span,
    .sparkles span,
    .balloons span{
      position:fixed;
      user-select:none;
      pointer-events:none;
      z-index:0;
    }

    .stars span{
      font-size:28px;
      animation:twinkle 3s infinite ease-in-out;
    }

    .sparkles span{
      font-size:20px;
      animation:twinkle 2.5s infinite ease-in-out;
    }

    .balloons span{
      font-size:50px;
      animation:floatUp 6s infinite ease-in-out;
      opacity:0.9;
    }

    .star1{ top:8%; right:12%; color:var(--amber); }
    .star2{ top:18%; left:12%; color:var(--barbie); }
    .star3{ bottom:18%; right:15%; color:var(--grape); }
    .star4{ bottom:12%; left:10%; color:var(--peach); }

    .spark1{ top:30%; right:22%; color:var(--barbie); }
    .spark2{ top:36%; left:24%; color:var(--amber); }
    .spark3{ bottom:28%; left:30%; color:var(--grape); }

    .balloon1{ top:10%; left:6%; }
    .balloon2{ top:12%; right:7%; }
    .balloon3{ bottom:8%; left:9%; }

    .page{
      position:relative;
      z-index:2;
      max-width:1150px;
      margin:auto;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-family:'Cairo', sans-serif;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:0.25s;
      box-shadow:0 8px 18px rgba(0,0,0,0.10);
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.03);
    }

    .btn-back{
      background:var(--amber);
      color:white;
    }

    .game-card{
      background:rgba(255,255,255,0.40);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:2px solid rgba(255,255,255,0.55);
      border-radius:32px;
      padding:30px 20px 35px;
      box-shadow:0 15px 40px rgba(158,31,99,0.15);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    h1{
      font-family:'Aref Ruqaa', serif;
      font-size:clamp(2.4rem, 6vw, 4.5rem);
      color:var(--grape);
      margin-bottom:12px;
      text-shadow:0 3px 0 var(--white), 0 8px 20px rgba(255,183,3,0.30);
    }

    .sub{
      color:var(--text);
      font-size:22px;
      font-weight:800;
      margin-bottom:24px;
    }

    .layout{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
      align-items:start;
    }

    .timer-section,
    .score-section{
      background:rgba(255,255,255,0.48);
      border-radius:30px;
      padding:24px 20px;
      box-shadow:0 10px 25px rgba(158,31,99,0.10);
      position:relative;
    }

    .section-title{
      font-size:25px;
      font-weight:900;
      color:var(--grape);
      margin-bottom:20px;
    }

    .timer-circle-wrap{
      display:flex;
      justify-content:center;
      margin-bottom:18px;
      position:relative;
    }

    .timer-circle{
      width:260px;
      height:260px;
      border-radius:50%;
      background:conic-gradient(var(--barbie) 0deg, var(--amber) 360deg);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 15px 35px rgba(158,31,99,0.18);
      position:relative;
      transition:0.4s;
    }

    .timer-circle::before{
      content:"";
      position:absolute;
      width:200px;
      height:200px;
      border-radius:50%;
      background:rgba(255,255,255,0.96);
    }

    .timer-circle.shake{
      animation:shakeTimer 0.45s linear 4;
    }

    .timer-circle.ended{
      box-shadow:0 0 0 8px rgba(255,77,109,0.18), 0 15px 35px rgba(255,77,109,0.22);
    }

    .timer-text{
      position:relative;
      z-index:2;
      font-size:54px;
      font-weight:900;
      color:var(--grape);
    }

    .timer-label{
      margin-top:8px;
      color:#7a325e;
      font-size:17px;
      font-weight:800;
    }

    .time-alert{
      display:none;
      margin:0 auto 18px;
      width:fit-content;
      max-width:100%;
      background:linear-gradient(135deg, #fff0f4, #ffffff);
      color:#e23d62;
      border:2px solid rgba(255,77,109,0.18);
      border-radius:22px;
      padding:14px 20px;
      font-size:24px;
      font-weight:900;
      box-shadow:0 12px 24px rgba(255,77,109,0.12);
      animation:popIn 0.35s ease;
    }

    .time-alert.show{
      display:block;
    }

    .timer-controls{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn-start{
      background:var(--amber);
      color:white;
    }

    .btn-stop{
      background:var(--barbie);
      color:white;
    }

    .btn-reset{
      background:var(--lavender);
      color:var(--grape);
    }

    .score-header{
      margin-bottom:18px;
      color:var(--text);
      font-size:18px;
      font-weight:800;
    }

    .leader-card{
      background:rgba(255,255,255,0.78);
      border-radius:24px;
      padding:16px;
      box-shadow:0 10px 22px rgba(158,31,99,0.08);
      margin-bottom:22px;
    }

    .lead-text{
      font-size:22px;
      font-weight:900;
      color:var(--grape);
    }

    .arena{
      height:320px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:28px;
      margin-bottom:20px;
      padding:10px 0;
    }

    .team-column-wrap{
      width:160px;
      text-align:center;
    }

    .score-top{
      font-size:42px;
      font-weight:900;
      color:var(--grape);
      margin-bottom:10px;
      transition:0.3s;
    }

    .column-track{
      height:220px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:12px;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,0.4);
    }

    .team-column{
      width:100%;
      height:70px;
      border-radius:24px 24px 12px 12px;
      transition:height 0.45s ease, transform 0.3s ease, box-shadow 0.3s ease;
      position:relative;
      overflow:hidden;
    }

    .team-column::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:28%;
      background:rgba(255,255,255,0.25);
      border-radius:24px 24px 0 0;
    }

    .team-column.first{
      background:linear-gradient(180deg, #ffd971, var(--amber));
      box-shadow:0 10px 24px rgba(255,183,3,0.20);
    }

    .team-column.second{
      background:linear-gradient(180deg, #ff9fd3, var(--barbie));
      box-shadow:0 10px 24px rgba(255,118,183,0.20);
    }

    .team-column.leader{
      transform:translateY(-8px) scale(1.03);
      box-shadow:0 0 0 6px rgba(255,255,255,0.45), 0 16px 30px rgba(158,31,99,0.18);
    }

    .team-label{
      margin-top:14px;
      font-size:22px;
      font-weight:900;
      color:var(--grape);
    }

    .scores-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .score-card{
      background:rgba(255,255,255,0.82);
      border-radius:24px;
      padding:18px 14px;
      box-shadow:0 10px 20px rgba(158,31,99,0.10);
      transition:0.3s;
    }

    .score-card.first-team{
      border:2px solid rgba(255,183,3,0.40);
    }

    .score-card.second-team{
      border:2px solid rgba(255,118,183,0.40);
    }

    .score-card.active{
      transform:translateY(-4px);
      box-shadow:0 0 0 5px rgba(255,255,255,0.45), 0 14px 24px rgba(158,31,99,0.15);
    }

    .team-name{
      color:var(--grape);
      font-size:22px;
      font-weight:900;
      margin-bottom:8px;
    }

    .score-actions{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .mini-btn{
      border:none;
      border-radius:999px;
      padding:9px 14px;
      font-family:'Cairo', sans-serif;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:0.25s;
    }

    .mini-btn:hover{
      transform:scale(1.05);
    }

    .plus-first{
      background:var(--amber);
      color:white;
    }

    .plus-second{
      background:var(--barbie);
      color:white;
    }

    .minus-btn{
      background:#f3e5ef;
      color:var(--grape);
    }

    .bottom-tools{
      margin-top:18px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn-reset-points{
      background:var(--grape);
      color:white;
    }

    .time-overlay{
      position:fixed;
      inset:0;
      background:rgba(107, 20, 80, 0.35);
      backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:99999;
      padding:20px;
    }

    .time-overlay.show{
      display:flex;
      animation:fadeOverlay 0.25s ease;
    }

    .overlay-box{
      background:rgba(255,255,255,0.94);
      border:2px solid rgba(255,255,255,0.8);
      border-radius:32px;
      padding:30px 24px;
      text-align:center;
      box-shadow:0 18px 40px rgba(158,31,99,0.18);
      max-width:480px;
      width:100%;
      animation:popIn 0.3s ease;
    }

    .overlay-box h2{
      color:#e23d62;
      font-size:clamp(2rem, 5vw, 3rem);
      margin-bottom:10px;
      font-weight:900;
    }

    .overlay-box p{
      color:var(--grape);
      font-size:20px;
      font-weight:800;
      margin-bottom:18px;
    }

    .overlay-btn{
      background:var(--grape);
      color:white;
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-family:'Cairo', sans-serif;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
    }

    @keyframes twinkle{
      0%,100%{ transform:scale(1); opacity:0.8; }
      50%{ transform:scale(1.22); opacity:1; }
    }

    @keyframes floatUp{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-18px); }
    }

    @keyframes popIn{
      from{
        opacity:0;
        transform:scale(0.85);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @keyframes fadeOverlay{
      from{ opacity:0; }
      to{ opacity:1; }
    }

    @keyframes shakeTimer{
      0%{ transform:translateX(0); }
      20%{ transform:translateX(-8px); }
      40%{ transform:translateX(8px); }
      60%{ transform:translateX(-8px); }
      80%{ transform:translateX(8px); }
      100%{ transform:translateX(0); }
    }

    @media (max-width:900px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:600px){
      .top-bar{
        justify-content:center;
      }

      .timer-circle{
        width:220px;
        height:220px;
      }

      .timer-circle::before{
        width:170px;
        height:170px;
      }

      .timer-text{
        font-size:44px;
      }

      .scores-grid{
        grid-template-columns:1fr;
      }

      .sub{
        font-size:18px;
      }

      .arena{
        gap:16px;
      }

      .team-column-wrap{
        width:130px;
      }

      .score-top{
        font-size:36px;
      }
    }
  </style>
</head>
<body>

  <div class="decor-circle c1"></div>
  <div class="decor-circle c2"></div>

  <div class="stars">
    <span class="star1">✦</span>
    <span class="star2">★</span>
    <span class="star3">✦</span>
    <span class="star4">★</span>
  </div>

  <div class="sparkles">
    <span class="spark1">✧</span>
    <span class="spark2">✧</span>
    <span class="spark3">✧</span>
  </div>

  <div class="balloons">
    <span class="balloon1">🎈</span>
    <span class="balloon2">🎈</span>
    <span class="balloon3">🎈</span>
  </div>

  <div class="page">
    <div class="top-bar">
      <a class="btn btn-back" href="الواجهة.html">رجوع للواجهة ✨</a>
    </div>

    <div class="game-card">
      <h1>قول بس لا تقول</h1>
      <p class="sub">جاهزين؟ دقيقة وحدة وتبان السرعة والذكاء 😌🔥</p>

      <div class="layout">
        <div class="timer-section">
          <div class="section-title">المؤقت ⏳</div>

          <div class="time-alert" id="timeAlert">انتهى الوقت! ⏰</div>

          <div class="timer-circle-wrap">
            <div class="timer-circle" id="timerCircle">
              <div>
                <div class="timer-text" id="timer">01:00</div>
                <div class="timer-label">مدة الجولة</div>
              </div>
            </div>
          </div>

          <div class="timer-controls">
            <button class="btn btn-start" onclick="startTimer()">ابدأ ▶</button>
            <button class="btn btn-stop" onclick="stopTimer()">إيقاف ⏸</button>
            <button class="btn btn-reset" onclick="resetTimer()">إعادة 🔄</button>
          </div>
        </div>

        <div class="score-section">
          <div class="section-title">النقاط 🎯</div>
          <div class="score-header">واضح مباشرة مين الفريق المتقدم</div>

          <div class="leader-card">
            <div class="lead-text" id="leadText">التعادل قائم 🤝</div>
          </div>

          <div class="arena">
            <div class="team-column-wrap">
              <div class="score-top" id="scoreFirst">0</div>
              <div class="column-track">
                <div class="team-column first" id="columnFirst"></div>
              </div>
              <div class="team-label">الفريق الأول</div>
            </div>

            <div class="team-column-wrap">
              <div class="score-top" id="scoreSecond">0</div>
              <div class="column-track">
                <div class="team-column second" id="columnSecond"></div>
              </div>
              <div class="team-label">الفريق الثاني</div>
            </div>
          </div>

          <div class="scores-grid">
            <div class="score-card first-team" id="cardFirst">
              <div class="team-name">الفريق الأول</div>
              <div class="score-actions">
                <button class="mini-btn plus-first" onclick="addPoint('first')">+1 نقطة</button>
                <button class="mini-btn minus-btn" onclick="removePoint('first')">-1</button>
              </div>
            </div>

            <div class="score-card second-team" id="cardSecond">
              <div class="team-name">الفريق الثاني</div>
              <div class="score-actions">
                <button class="mini-btn plus-second" onclick="addPoint('second')">+1 نقطة</button>
                <button class="mini-btn minus-btn" onclick="removePoint('second')">-1</button>
              </div>
            </div>
          </div>

          <div class="bottom-tools">
            <button class="btn btn-reset-points" onclick="resetScores()">تصفير النقاط 🪄</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="time-overlay" id="timeOverlay">
    <div class="overlay-box">
      <h2>وقفوا!</h2>
      <p>انتهى الوقت ⏰</p>
      <button class="overlay-btn" onclick="closeOverlay()">إغلاق</button>
    </div>
  </div>

  <audio id="bellSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
  </audio>

  <script>
    let totalSeconds = 60;
    let currentSeconds = 60;
    let timerInterval = null;

    let scoreFirst = 0;
    let scoreSecond = 0;

    const timerText = document.getElementById("timer");
    const timerCircle = document.getElementById("timerCircle");
    const timeAlert = document.getElementById("timeAlert");
    const timeOverlay = document.getElementById("timeOverlay");
    const bellSound = document.getElementById("bellSound");

    const scoreFirstText = document.getElementById("scoreFirst");
    const scoreSecondText = document.getElementById("scoreSecond");

    const columnFirst = document.getElementById("columnFirst");
    const columnSecond = document.getElementById("columnSecond");

    const leadText = document.getElementById("leadText");
    const cardFirst = document.getElementById("cardFirst");
    const cardSecond = document.getElementById("cardSecond");

    function updateTimerDisplay(){
      const minutes = String(Math.floor(currentSeconds / 60)).padStart(2, "0");
      const seconds = String(currentSeconds % 60).padStart(2, "0");
      timerText.textContent = `${minutes}:${seconds}`;

      const progress = currentSeconds / totalSeconds;
      const degrees = progress * 360;
      timerCircle.style.background = `conic-gradient(var(--barbie) 0deg, var(--amber) ${degrees}deg, #f3dff0 ${degrees}deg 360deg)`;

      if(currentSeconds <= 10){
        timerText.style.color = "#ff4d6d";
      } else {
        timerText.style.color = "var(--grape)";
      }
    }

    function playBell(){
      bellSound.currentTime = 0;
      bellSound.play().catch(() => {});
    }

    function startTimer(){
      if(timerInterval) return;

      timeAlert.classList.remove("show");
      timeOverlay.classList.remove("show");
      timerCircle.classList.remove("shake", "ended");

      timerInterval = setInterval(() => {
        if(currentSeconds > 0){
          currentSeconds--;
          updateTimerDisplay();
        } else {
          clearInterval(timerInterval);
          timerInterval = null;
          timerCircle.classList.add("shake", "ended");
          timeAlert.classList.add("show");
          timeOverlay.classList.add("show");
          playBell();
        }
      }, 1000);
    }

    function stopTimer(){
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function resetTimer(){
      clearInterval(timerInterval);
      timerInterval = null;
      currentSeconds = 60;
      timerCircle.classList.remove("shake", "ended");
      timeAlert.classList.remove("show");
      timeOverlay.classList.remove("show");
      updateTimerDisplay();
    }

    function closeOverlay(){
      timeOverlay.classList.remove("show");
    }

    function addPoint(team){
      if(team === "first"){
        scoreFirst++;
      } else {
        scoreSecond++;
      }
      updateScores();
    }

    function removePoint(team){
      if(team === "first" && scoreFirst > 0){
        scoreFirst--;
      } else if(team === "second" && scoreSecond > 0){
        scoreSecond--;
      }
      updateScores();
    }

    function resetScores(){
      scoreFirst = 0;
      scoreSecond = 0;
      updateScores();
    }

    function updateScores(){
      scoreFirstText.textContent = scoreFirst;
      scoreSecondText.textContent = scoreSecond;

      const firstHeight = 70 + (scoreFirst * 16);
      const secondHeight = 70 + (scoreSecond * 16);

      columnFirst.style.height = firstHeight + "px";
      columnSecond.style.height = secondHeight + "px";

      columnFirst.classList.remove("leader");
      columnSecond.classList.remove("leader");
      cardFirst.classList.remove("active");
      cardSecond.classList.remove("active");

      if(scoreFirst > scoreSecond){
        leadText.textContent = "الفريق الأول متقدم 🔥";
        columnFirst.classList.add("leader");
        cardFirst.classList.add("active");
      } else if(scoreSecond > scoreFirst){
        leadText.textContent = "الفريق الثاني متقدم 🔥";
        columnSecond.classList.add("leader");
        cardSecond.classList.add("active");
      } else {
        leadText.textContent = "التعادل قائم 🤝";
      }
    }

    updateTimerDisplay();
    updateScores();
  </script>

</body>
</html>
