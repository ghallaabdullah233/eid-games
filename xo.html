<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة اكس او</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --amber:#FFB703;
      --sky:#D7F0F5;
      --barbie:#FF76B7;
      --lavender:#E2C6FE;
      --peach:#FFA981;
      --grape:#9E1F63;
      --white:#ffffff;
      --soft:#fff7fc;
      --text:#6b1450;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:'Cairo', sans-serif;
      background:linear-gradient(180deg, var(--sky), #fbe6f6, var(--lavender));
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      padding:30px 16px;
    }

    .decor-circle{
      position:fixed;
      border-radius:50%;
      opacity:0.30;
      filter:blur(8px);
      z-index:0;
    }

    .c1{
      width:220px;
      height:220px;
      background:var(--amber);
      top:-40px;
      right:-50px;
    }

    .c2{
      width:180px;
      height:180px;
      background:var(--barbie);
      bottom:-30px;
      left:-40px;
    }

    .floating-decor span{
      position:fixed;
      user-select:none;
      pointer-events:none;
      z-index:0;
      opacity:0.65;
      animation:floaty 4s infinite ease-in-out;
    }

    .d1{ top:9%; right:9%; font-size:30px; color:var(--amber); }
    .d2{ top:22%; left:9%; font-size:28px; color:var(--barbie); }
    .d3{ bottom:16%; left:10%; font-size:30px; color:var(--peach); }
    .d4{ bottom:12%; right:14%; font-size:28px; color:var(--grape); }

    .page{
      position:relative;
      z-index:2;
      max-width:950px;
      margin:auto;
    }

    .game-card{
      background:rgba(255,255,255,0.45);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:2px solid rgba(255,255,255,0.55);
      border-radius:34px;
      padding:28px 20px 34px;
      box-shadow:0 15px 40px rgba(158,31,99,0.15);
      text-align:center;
      overflow:hidden;
    }

    h1{
      font-family:'Aref Ruqaa', serif;
      font-size:clamp(2.6rem, 6vw, 4.8rem);
      color:var(--grape);
      margin-bottom:10px;
      text-shadow:0 3px 0 white, 0 8px 20px rgba(255,183,3,0.25);
    }

    .sub{
      color:var(--text);
      font-size:22px;
      font-weight:800;
      margin-bottom:16px;
    }

    .status-box{
      width:fit-content;
      max-width:100%;
      margin:0 auto 20px;
      background:#fff6fc;
      color:var(--grape);
      padding:14px 20px;
      border-radius:22px;
      font-size:24px;
      font-weight:900;
      box-shadow:0 8px 18px rgba(158,31,99,0.08);
      min-width:280px;
    }

    .board-wrap{
      position:relative;
      width:fit-content;
      margin:0 auto 24px;
      padding:8px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3, 110px);
      gap:14px;
      justify-content:center;
    }

    .cell{
      width:110px;
      height:110px;
      background:rgba(255,255,255,0.95);
      border:none;
      border-radius:26px;
      font-size:52px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(158,31,99,0.10);
      transition:0.25s;
      color:var(--grape);
      font-family:'Cairo', sans-serif;
    }

    .cell:hover{
      transform:translateY(-3px) scale(1.03);
    }

    .cell.x{
      background:linear-gradient(180deg, #ffd25f, var(--amber));
      color:white;
    }

    .cell.o{
      background:linear-gradient(180deg, #ff96cb, var(--barbie));
      color:white;
    }

    .controls{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:13px 24px;
      font-family:'Cairo', sans-serif;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:0.25s;
      box-shadow:0 10px 20px rgba(0,0,0,0.10);
      color:white;
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.03);
    }

    .btn-reset{
      background:linear-gradient(90deg, #ff92ca, var(--barbie));
    }

    .btn-home{
      background:linear-gradient(90deg, #ffcf58, var(--amber));
    }

    .btn-wheel{
      background:linear-gradient(90deg, #ffbb8a, var(--peach));
    }

    .helper{
      margin-top:22px;
      background:rgba(255,255,255,0.78);
      color:var(--grape);
      border-radius:22px;
      padding:14px 18px;
      font-size:18px;
      font-weight:800;
      line-height:1.9;
      box-shadow:0 8px 18px rgba(158,31,99,0.08);
    }

    .win-line{
      position:absolute;
      background:var(--grape);
      border-radius:999px;
      box-shadow:0 6px 16px rgba(158,31,99,0.2);
      opacity:0;
      transition:0.25s;
      pointer-events:none;
      z-index:3;
    }

    .win-line.show{
      opacity:1;
    }

    .celebrate{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(107, 20, 80, 0.18);
      backdrop-filter:blur(3px);
      -webkit-backdrop-filter:blur(3px);
      z-index:9999;
      padding:20px;
    }

    .celebrate.show{
      display:flex;
      animation:fadeIn 0.25s ease;
    }

    .celebrate-box{
      background:rgba(255,255,255,0.96);
      border-radius:30px;
      padding:28px 24px;
      text-align:center;
      width:min(92%, 480px);
      box-shadow:0 18px 40px rgba(158,31,99,0.18);
      animation:popIn 0.28s ease;
    }

    .celebrate-box h2{
      color:var(--grape);
      font-size:clamp(2rem, 5vw, 3rem);
      margin-bottom:10px;
    }

    .celebrate-box p{
      color:#8f406f;
      font-size:22px;
      font-weight:900;
      line-height:1.8;
      margin-bottom:14px;
    }

    @keyframes floaty{
      0%,100%{ transform:translateY(0px); }
      50%{ transform:translateY(-12px); }
    }

    @keyframes popIn{
      from{ opacity:0; transform:scale(0.88); }
      to{ opacity:1; transform:scale(1); }
    }

    @keyframes fadeIn{
      from{ opacity:0; }
      to{ opacity:1; }
    }

    @media (max-width:600px){
      .board{
        grid-template-columns:repeat(3, 92px);
        gap:12px;
      }

      .cell{
        width:92px;
        height:92px;
        font-size:44px;
      }

      .status-box{
        font-size:20px;
        min-width:220px;
      }
    }
  </style>
</head>
<body>

  <div class="decor-circle c1"></div>
  <div class="decor-circle c2"></div>

  <div class="floating-decor">
    <span class="d1">✨</span>
    <span class="d2">🎉</span>
    <span class="d3">💖</span>
    <span class="d4">🪄</span>
  </div>

  <div class="page">
    <div class="game-card">
      <h1>لعبة اكس او</h1>
      <div class="sub">جاهزين؟ خلونا نشوف مين بيفوز 🎊</div>

      <div class="status-box" id="statusText">الدور الآن: X</div>

      <div class="board-wrap" id="boardWrap">
        <div class="win-line" id="winLine"></div>

        <div class="board">
          <button class="cell" onclick="play(0,this)"></button>
          <button class="cell" onclick="play(1,this)"></button>
          <button class="cell" onclick="play(2,this)"></button>

          <button class="cell" onclick="play(3,this)"></button>
          <button class="cell" onclick="play(4,this)"></button>
          <button class="cell" onclick="play(5,this)"></button>

          <button class="cell" onclick="play(6,this)"></button>
          <button class="cell" onclick="play(7,this)"></button>
          <button class="cell" onclick="play(8,this)"></button>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-reset" onclick="restart()">إعادة اللعب 🔁</button>
        <a class="btn btn-home" href="index.html">العودة للرئيسية 🏠</a>
        <a class="btn btn-wheel" href="https://wheelofnames.com/ar/" target="_blank">توزيع الفريقين 🎡</a>
      </div>

      <div class="helper">
        إذا تبين تقسّمين المشاركين قبل اللعب، اضغطي على توزيع الفريقين 🎯
      </div>
    </div>
  </div>

  <div class="celebrate" id="celebrate">
    <div class="celebrate-box">
      <h2>مبرووك 🎉</h2>
      <p id="winnerText">الفائز هو X</p>
      <button class="btn btn-reset" onclick="closeCelebrate()">إغلاق</button>
    </div>
  </div>

  <script>
    let currentPlayer = "X";
    let board = ["","","","","","","","",""];
    let gameActive = true;

    const statusText = document.getElementById("statusText");
    const celebrate = document.getElementById("celebrate");
    const winnerText = document.getElementById("winnerText");
    const winLine = document.getElementById("winLine");

    const wins = [
      [0,1,2],
      [3,4,5],
      [6,7,8],
      [0,3,6],
      [1,4,7],
      [2,5,8],
      [0,4,8],
      [2,4,6]
    ];

    function play(index, cell){
      if(!gameActive) return;
      if(board[index] !== "") return;

      board[index] = currentPlayer;
      cell.textContent = currentPlayer;
      cell.classList.add(currentPlayer.toLowerCase());

      const winner = checkWinner();

      if(winner){
        gameActive = false;
        statusText.textContent = "انتهت الجولة";
        winnerText.textContent = "الفائز هو " + winner.player;
        drawWinLine(winner.combo);
        setTimeout(() => {
          celebrate.classList.add("show");
        }, 350);
        return;
      }

      if(board.every(item => item !== "")){
        gameActive = false;
        statusText.textContent = "تعادل 🤝";
        return;
      }

      currentPlayer = currentPlayer === "X" ? "O" : "X";
      statusText.textContent = "الدور الآن: " + currentPlayer;
    }

    function checkWinner(){
      for(let combo of wins){
        const [a,b,c] = combo;
        if(board[a] && board[a] === board[b] && board[a] === board[c]){
          return { player: board[a], combo: combo };
        }
      }
      return null;
    }

    function drawWinLine(combo){
      const positions = {
        0:{x:55,y:55}, 1:{x:179,y:55}, 2:{x:303,y:55},
        3:{x:55,y:179}, 4:{x:179,y:179}, 5:{x:303,y:179},
        6:{x:55,y:303}, 7:{x:179,y:303}, 8:{x:303,y:303}
      };

      const start = positions[combo[0]];
      const end = positions[combo[2]];

      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const length = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      winLine.style.width = length + "px";
      winLine.style.height = "8px";
      winLine.style.left = start.x + "px";
      winLine.style.top = start.y + "px";
      winLine.style.transformOrigin = "0 50%";
      winLine.style.transform = `translateY(-50%) rotate(${angle}deg)`;
      winLine.classList.add("show");
    }

    function restart(){
      currentPlayer = "X";
      board = ["","","","","","","","",""];
      gameActive = true;
      statusText.textContent = "الدور الآن: X";
      winLine.classList.remove("show");

      document.querySelectorAll(".cell").forEach(cell => {
        cell.textContent = "";
        cell.classList.remove("x","o");
      });

      celebrate.classList.remove("show");
    }

    function closeCelebrate(){
      celebrate.classList.remove("show");
    }
  </script>

</body>
</html>
