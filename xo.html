<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة اكس او</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --amber:#FFB703;
      --sky:#D7F0F5;
      --barbie:#FF76B7;
      --lavender:#E2C6FE;
      --peach:#FFA981;
      --grape:#9E1F63;
      --pastel:#FFD3F7;
      --white:#ffffff;
      --text:#6b1450;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Cairo', sans-serif;
      background:linear-gradient(180deg, var(--sky), var(--pastel), var(--lavender));
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      padding:30px 16px;
    }

    .decor-circle{
      position:fixed;
      border-radius:50%;
      opacity:0.35;
      filter:blur(8px);
      z-index:0;
    }

    .c1{
      width:220px;
      height:220px;
      background:var(--amber);
      top:-40px;
      right:-50px;
    }

    .c2{
      width:180px;
      height:180px;
      background:var(--barbie);
      bottom:-30px;
      left:-40px;
    }

    .stars span,
    .sparkles span,
    .balloons span{
      position:fixed;
      user-select:none;
      pointer-events:none;
      z-index:0;
    }

    .stars span{
      font-size:28px;
      animation:twinkle 3s infinite ease-in-out;
    }

    .sparkles span{
      font-size:20px;
      animation:twinkle 2.5s infinite ease-in-out;
    }

    .balloons span{
      font-size:50px;
      animation:floatUp 6s infinite ease-in-out;
      opacity:0.9;
    }

    .star1{ top:8%; right:12%; color:var(--amber); }
    .star2{ top:18%; left:12%; color:var(--barbie); }
    .star3{ bottom:18%; right:15%; color:var(--grape); }
    .star4{ bottom:12%; left:10%; color:var(--peach); }

    .spark1{ top:30%; right:22%; color:var(--barbie); }
    .spark2{ top:36%; left:24%; color:var(--amber); }
    .spark3{ bottom:28%; left:30%; color:var(--grape); }

    .balloon1{ top:10%; left:6%; }
    .balloon2{ top:12%; right:7%; }
    .balloon3{ bottom:8%; left:9%; }

    .page{
      position:relative;
      z-index:2;
      max-width:1050px;
      margin:auto;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .side-btns{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-family:'Cairo', sans-serif;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:0.25s;
      box-shadow:0 8px 18px rgba(0,0,0,0.10);
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.03);
    }

    .btn-wheel{
      background:var(--grape);
      color:white;
    }

    .btn-back{
      background:var(--amber);
      color:white;
    }

    .game-card{
      background:rgba(255,255,255,0.40);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:2px solid rgba(255,255,255,0.55);
      border-radius:32px;
      padding:30px 20px 35px;
      box-shadow:0 15px 40px rgba(158,31,99,0.15);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    h1{
      font-family:'Aref Ruqaa', serif;
      font-size:clamp(2.4rem, 6vw, 4.5rem);
      color:var(--grape);
      margin-bottom:12px;
      text-shadow:0 3px 0 var(--white), 0 8px 20px rgba(255,183,3,0.30);
    }

    .sub{
      color:var(--text);
      font-size:18px;
      font-weight:700;
      margin-bottom:16px;
    }

    .team-badge{
      width:fit-content;
      margin:0 auto 18px;
      background:rgba(255,255,255,0.82);
      color:var(--grape);
      padding:10px 18px;
      border-radius:18px;
      font-size:17px;
      font-weight:800;
      box-shadow:0 8px 20px rgba(158,31,99,0.10);
    }

    .winner-box{
      display:none;
      margin:0 auto 22px;
      width:fit-content;
      max-width:90%;
      background:linear-gradient(135deg, #fff, #fff4fb);
      color:var(--grape);
      border-radius:24px;
      padding:16px 22px;
      font-size:20px;
      font-weight:900;
      box-shadow:0 15px 35px rgba(255,118,183,0.18);
      animation:popIn 0.5s ease;
      line-height:1.8;
    }

    .winner-box.show{
      display:block;
    }

    .board{
      width:312px;
      display:grid;
      grid-template-columns:repeat(3, 96px);
      gap:12px;
      justify-content:center;
      margin:0 auto 26px;
    }

    .cell{
      width:96px;
      height:96px;
      border-radius:22px;
      border:none;
      background:rgba(255,255,255,0.92);
      color:var(--grape);
      font-size:46px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(158,31,99,0.10);
      transition:0.2s;
    }

    .cell:hover{
      transform:scale(1.04);
      background:white;
    }

    .cell:disabled{
      cursor:default;
    }

    .cell.x-style{
      background:var(--amber);
      color:white;
    }

    .cell.o-style{
      background:white;
      color:var(--grape);
    }

    .cell.win{
      background:var(--barbie) !important;
      color:white !important;
      transform:scale(1.08);
      box-shadow:0 0 0 4px rgba(255,255,255,0.6), 0 12px 28px rgba(255,118,183,0.35);
      animation:winnerPulse 0.9s infinite alternate;
    }

    .scoreboard{
      margin:10px auto 26px;
      display:grid;
      grid-template-columns:repeat(2, minmax(180px, 240px));
      justify-content:center;
      gap:16px;
    }

    .score-card{
      background:rgba(255,255,255,0.72);
      border-radius:24px;
      padding:18px 16px;
      box-shadow:0 10px 22px rgba(158,31,99,0.10);
    }

    .score-card.x-team{
      border:2px solid rgba(255,183,3,0.45);
    }

    .score-card.o-team{
      border:2px solid rgba(255,118,183,0.45);
    }

    .score-title{
      font-size:20px;
      font-weight:900;
      color:var(--grape);
      margin-bottom:8px;
    }

    .score-number{
      font-size:42px;
      font-weight:900;
      color:var(--grape);
      margin-bottom:12px;
    }

    .score-buttons{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .mini-btn{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      font-family:'Cairo', sans-serif;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:0.25s;
    }

    .mini-btn:hover{
      transform:scale(1.05);
    }

    .plus-x{
      background:var(--amber);
      color:white;
    }

    .plus-o{
      background:var(--barbie);
      color:white;
    }

    .minus-btn{
      background:#f3e5ef;
      color:var(--grape);
    }

    .reset-score{
      background:var(--lavender);
      color:var(--grape);
      margin-top:14px;
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-family:'Cairo', sans-serif;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      transition:0.25s;
    }

    .reset-score:hover{
      transform:scale(1.05);
    }

    .controls{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn-restart{
      background:var(--barbie);
      color:white;
    }

    .btn-home{
      background:var(--peach);
      color:white;
    }

    .note{
      margin-top:20px;
      color:#7b3562;
      font-size:15px;
      font-weight:700;
    }

    .confetti{
      position:fixed;
      width:12px;
      height:18px;
      top:-20px;
      opacity:0.95;
      z-index:9999;
      pointer-events:none;
      animation:fall linear forwards;
      border-radius:4px;
    }

    @keyframes twinkle{
      0%,100%{ transform:scale(1); opacity:0.8; }
      50%{ transform:scale(1.22); opacity:1; }
    }

    @keyframes floatUp{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-18px); }
    }

    @keyframes popIn{
      from{
        opacity:0;
        transform:scale(0.7);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    @keyframes winnerPulse{
      from{
        transform:scale(1.04);
      }
      to{
        transform:scale(1.10);
      }
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(720deg);
        opacity:1;
      }
    }

    @media (max-width:600px){
      .top-bar{
        justify-content:center;
      }

      .board{
        width:270px;
        grid-template-columns:repeat(3, 82px);
      }

      .cell{
        width:82px;
        height:82px;
        font-size:40px;
      }

      .winner-box{
        font-size:18px;
      }

      .scoreboard{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="decor-circle c1"></div>
  <div class="decor-circle c2"></div>

  <div class="stars">
    <span class="star1">✦</span>
    <span class="star2">★</span>
    <span class="star3">✦</span>
    <span class="star4">★</span>
  </div>

  <div class="sparkles">
    <span class="spark1">✧</span>
    <span class="spark2">✧</span>
    <span class="spark3">✧</span>
  </div>

  <div class="balloons">
    <span class="balloon1">🎈</span>
    <span class="balloon2">🎈</span>
    <span class="balloon3">🎈</span>
  </div>

  <div class="page">
    <div class="top-bar">
      <div class="side-btns">
        <a class="btn btn-wheel" href="https://wheelofnames.com/ar/" target="_blank">
          توزيع الفريقين 🎡
        </a>
      </div>

      <a class="btn btn-back" href="الواجهة.html">رجوع للواجهة ✨</a>
    </div>

    <div class="game-card">
      <h1>لعبة اكس او</h1>
      <p class="sub">جاهزين؟ خلونا نشوف مين يفوز 🎉</p>

      <div class="team-badge" id="turnBadge">الفريق الحالي: X</div>

      <div class="winner-box" id="winnerBox"></div>

      <div class="board">
        <button class="cell" onclick="play(0)"></button>
        <button class="cell" onclick="play(1)"></button>
        <button class="cell" onclick="play(2)"></button>

        <button class="cell" onclick="play(3)"></button>
        <button class="cell" onclick="play(4)"></button>
        <button class="cell" onclick="play(5)"></button>

        <button class="cell" onclick="play(6)"></button>
        <button class="cell" onclick="play(7)"></button>
        <button class="cell" onclick="play(8)"></button>
      </div>

      <div class="scoreboard">
        <div class="score-card x-team">
          <div class="score-title">فريق X</div>
          <div class="score-number" id="scoreX">0</div>
          <div class="score-buttons">
            <button class="mini-btn plus-x" onclick="addPoint('X')">+1 نقطة</button>
            <button class="mini-btn minus-btn" onclick="removePoint('X')">-1</button>
          </div>
        </div>

        <div class="score-card o-team">
          <div class="score-title">فريق O</div>
          <div class="score-number" id="scoreO">0</div>
          <div class="score-buttons">
            <button class="mini-btn plus-o" onclick="addPoint('O')">+1 نقطة</button>
            <button class="mini-btn minus-btn" onclick="removePoint('O')">-1</button>
          </div>
        </div>
      </div>

      <button class="reset-score" onclick="resetScores()">تصفير النقاط 🪄</button>

      <div class="controls">
        <button class="btn btn-restart" onclick="restartGame()">إعادة اللعب 🔄</button>
        <a class="btn btn-home" href="index.html">العودة للرئيسية 🏠</a>
      </div>

      <p class="note">إذا تبين تقسيمين الفرق قبل اللعب، اضغطي على توزيع الفريقين 💖</p>
    </div>
  </div>

  <audio id="clapSound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mpeg">
  </audio>

  <script>
    let currentPlayer = "X";
    let gameActive = true;
    let board = ["", "", "", "", "", "", "", "", ""];
    let scoreX = 0;
    let scoreO = 0;

    const turnBadge = document.getElementById("turnBadge");
    const winnerBox = document.getElementById("winnerBox");
    const clapSound = document.getElementById("clapSound");
    const cells = document.querySelectorAll(".cell");
    const scoreXText = document.getElementById("scoreX");
    const scoreOText = document.getElementById("scoreO");

    const winPatterns = [
      [0,1,2],
      [3,4,5],
      [6,7,8],
      [0,3,6],
      [1,4,7],
      [2,5,8],
      [0,4,8],
      [2,4,6]
    ];

    function play(index){
      if(!gameActive || board[index] !== "") return;

      board[index] = currentPlayer;
      cells[index].textContent = currentPlayer;

      if(currentPlayer === "X"){
        cells[index].classList.add("x-style");
      }else{
        cells[index].classList.add("o-style");
      }

      const winnerData = checkWinner();

      if(winnerData){
        gameActive = false;
        turnBadge.textContent = "الفريق الفائز: " + currentPlayer + " 🏆";
        winnerBox.textContent = "مبروك! الفريق " + currentPlayer + " هو الفائز 🎊";
        winnerBox.classList.add("show");
        highlightWinner(winnerData.pattern);
        disableBoard();
        launchConfetti();
        playClap();
        addPoint(currentPlayer);
        return;
      }

      if(board.every(cell => cell !== "")){
        gameActive = false;
        turnBadge.textContent = "انتهت اللعبة بتعادل 🤝";
        winnerBox.textContent = "تعادل جميل! جربوا مرة ثانية 🤍";
        winnerBox.classList.add("show");
        return;
      }

      currentPlayer = currentPlayer === "X" ? "O" : "X";
      turnBadge.textContent = "الفريق الحالي: " + currentPlayer;
    }

    function checkWinner(){
      for(let i = 0; i < winPatterns.length; i++){
        const pattern = winPatterns[i];
        const [a,b,c] = pattern;

        if(
          board[a] !== "" &&
          board[a] === board[b] &&
          board[a] === board[c]
        ){
          return { pattern: pattern };
        }
      }
      return null;
    }

    function highlightWinner(pattern){
      pattern.forEach(index => {
        cells[index].classList.add("win");
      });
    }

    function disableBoard(){
      cells.forEach(cell => {
        cell.disabled = true;
      });
    }

    function playClap(){
      clapSound.currentTime = 0;
      clapSound.play().catch(() => {});
    }

    function launchConfetti(){
      const colors = ["#FFB703", "#FF76B7", "#E2C6FE", "#FFA981", "#9E1F63", "#FFD3F7"];

      for(let i = 0; i < 120; i++){
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
        confetti.style.transform = "rotate(" + (Math.random() * 360) + "deg)";

        document.body.appendChild(confetti);

        setTimeout(() => {
          confetti.remove();
        }, 4500);
      }
    }

    function addPoint(team){
      if(team === "X"){
        scoreX++;
        scoreXText.textContent = scoreX;
      }else{
        scoreO++;
        scoreOText.textContent = scoreO;
      }
    }

    function removePoint(team){
      if(team === "X" && scoreX > 0){
        scoreX--;
        scoreXText.textContent = scoreX;
      }else if(team === "O" && scoreO > 0){
        scoreO--;
        scoreOText.textContent = scoreO;
      }
    }

    function resetScores(){
      scoreX = 0;
      scoreO = 0;
      scoreXText.textContent = 0;
      scoreOText.textContent = 0;
    }

    function restartGame(){
      currentPlayer = "X";
      gameActive = true;
      board = ["", "", "", "", "", "", "", "", ""];

      turnBadge.textContent = "الفريق الحالي: X";
      winnerBox.textContent = "";
      winnerBox.classList.remove("show");

      cells.forEach(cell => {
        cell.textContent = "";
        cell.disabled = false;
        cell.classList.remove("win", "x-style", "o-style");
      });
    }
  </script>

</body>
</html>
