<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تطابق الصور</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --amber:#FFB703;
      --sky:#D7F0F5;
      --barbie:#FF76B7;
      --lavender:#E2C6FE;
      --peach:#FFA981;
      --grape:#9E1F63;
      --pastel:#FFD3F7;
      --white:#ffffff;
      --text:#6b1450;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Cairo', sans-serif;
      background:linear-gradient(180deg, var(--sky), var(--pastel), var(--lavender));
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
      padding:30px 16px;
    }

    .decor-circle{
      position:fixed;
      border-radius:50%;
      opacity:0.35;
      filter:blur(8px);
      z-index:0;
    }

    .c1{
      width:220px;
      height:220px;
      background:var(--amber);
      top:-40px;
      right:-50px;
    }

    .c2{
      width:180px;
      height:180px;
      background:var(--barbie);
      bottom:-30px;
      left:-40px;
    }

    .stars span,
    .sparkles span,
    .balloons span{
      position:fixed;
      user-select:none;
      pointer-events:none;
      z-index:0;
    }

    .stars span{
      font-size:28px;
      animation:twinkle 3s infinite ease-in-out;
    }

    .sparkles span{
      font-size:20px;
      animation:twinkle 2.5s infinite ease-in-out;
    }

    .balloons span{
      font-size:50px;
      animation:floatUp 6s infinite ease-in-out;
      opacity:0.9;
    }

    .star1{ top:8%; right:12%; color:var(--amber); }
    .star2{ top:18%; left:12%; color:var(--barbie); }
    .star3{ bottom:18%; right:15%; color:var(--grape); }
    .star4{ bottom:12%; left:10%; color:var(--peach); }

    .spark1{ top:30%; right:22%; color:var(--barbie); }
    .spark2{ top:36%; left:24%; color:var(--amber); }
    .spark3{ bottom:28%; left:30%; color:var(--grape); }

    .balloon1{ top:10%; left:6%; }
    .balloon2{ top:12%; right:7%; }
    .balloon3{ bottom:8%; left:9%; }

    .page{
      position:relative;
      z-index:2;
      max-width:1200px;
      margin:auto;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:12px 22px;
      font-family:'Cairo', sans-serif;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      transition:0.25s;
      box-shadow:0 8px 18px rgba(0,0,0,0.10);
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.03);
    }

    .btn-back{
      background:var(--amber);
      color:white;
    }

    .btn-reset{
      background:var(--grape);
      color:white;
    }

    .game-card{
      background:rgba(255,255,255,0.40);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:2px solid rgba(255,255,255,0.55);
      border-radius:32px;
      padding:30px 20px 35px;
      box-shadow:0 15px 40px rgba(158,31,99,0.15);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    h1{
      font-family:'Aref Ruqaa', serif;
      font-size:clamp(2.4rem, 6vw, 4.5rem);
      color:var(--grape);
      margin-bottom:12px;
      text-shadow:0 3px 0 var(--white), 0 8px 20px rgba(255,183,3,0.30);
    }

    .sub{
      color:var(--text);
      font-size:22px;
      font-weight:800;
      margin-bottom:18px;
    }

    .main-layout{
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      gap:24px;
      align-items:start;
    }

    .board-section{
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:22px;
      box-shadow:0 10px 25px rgba(158,31,99,0.10);
    }

    .level-badge{
      width:fit-content;
      margin:0 auto 18px;
      background:rgba(255,255,255,0.86);
      color:var(--grape);
      font-size:16px;
      font-weight:900;
      padding:10px 18px;
      border-radius:18px;
      box-shadow:0 8px 16px rgba(158,31,99,0.08);
    }

    .memory-grid{
      display:grid;
      gap:12px;
      justify-content:center;
    }

    .memory-grid.easy{
      grid-template-columns:repeat(4, 90px);
    }

    .memory-grid.medium{
      grid-template-columns:repeat(4, 85px);
    }

    .memory-grid.hard{
      grid-template-columns:repeat(5, 74px);
    }

    .card{
      width:90px;
      height:90px;
      perspective:1000px;
      cursor:pointer;
    }

    .medium .card{
      width:85px;
      height:85px;
    }

    .hard .card{
      width:74px;
      height:74px;
    }

    .card-inner{
      position:relative;
      width:100%;
      height:100%;
      transition:transform 0.5s;
      transform-style:preserve-3d;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner{
      transform:rotateY(180deg);
    }

    .card-face{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 18px rgba(158,31,99,0.10);
      user-select:none;
    }

    .card-back{
      background:linear-gradient(135deg, var(--amber), var(--barbie));
      color:white;
      font-size:28px;
      font-weight:900;
    }

    .card-front{
      background:rgba(255,255,255,0.96);
      transform:rotateY(180deg);
      font-size:34px;
    }

    .hard .card-front{
      font-size:28px;
    }

    .card.matched .card-front{
      box-shadow:0 0 0 4px rgba(255,255,255,0.5), 0 12px 22px rgba(255,118,183,0.18);
    }

    .side-section{
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:22px 18px 26px;
      box-shadow:0 10px 25px rgba(158,31,99,0.10);
    }

    .side-title{
      color:var(--grape);
      font-size:24px;
      font-weight:900;
      margin-bottom:14px;
    }

    .turn-box{
      background:rgba(255,255,255,0.82);
      border-radius:22px;
      padding:14px 16px;
      box-shadow:0 10px 20px rgba(158,31,99,0.08);
      margin-bottom:18px;
      color:var(--grape);
      font-size:20px;
      font-weight:900;
    }

    .pairs-box{
      background:#fff6fc;
      color:var(--grape);
      border-radius:20px;
      padding:12px 16px;
      font-size:17px;
      font-weight:800;
      margin-bottom:20px;
      box-shadow:0 8px 18px rgba(158,31,99,0.08);
    }

    .leader-card{
      background:rgba(255,255,255,0.78);
      border-radius:24px;
      padding:16px;
      box-shadow:0 10px 22px rgba(158,31,99,0.08);
      margin-bottom:22px;
    }

    .lead-text{
      font-size:22px;
      font-weight:900;
      color:var(--grape);
    }

    .arena{
      height:300px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:24px;
      margin-bottom:20px;
      padding:10px 0;
    }

    .team-column-wrap{
      width:150px;
      text-align:center;
    }

    .score-top{
      font-size:40px;
      font-weight:900;
      color:var(--grape);
      margin-bottom:10px;
    }

    .column-track{
      height:210px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      background:rgba(255,255,255,0.45);
      border-radius:28px;
      padding:12px;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,0.4);
    }

    .team-column{
      width:100%;
      height:70px;
      border-radius:24px 24px 12px 12px;
      transition:height 0.45s ease, transform 0.3s ease, box-shadow 0.3s ease;
      position:relative;
      overflow:hidden;
    }

    .team-column::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:28%;
      background:rgba(255,255,255,0.25);
      border-radius:24px 24px 0 0;
    }

    .team-column.first{
      background:linear-gradient(180deg, #ffd971, var(--amber));
      box-shadow:0 10px 24px rgba(255,183,3,0.20);
    }

    .team-column.second{
      background:linear-gradient(180deg, #ff9fd3, var(--barbie));
      box-shadow:0 10px 24px rgba(255,118,183,0.20);
    }

    .team-column.leader{
      transform:translateY(-8px) scale(1.03);
      box-shadow:0 0 0 6px rgba(255,255,255,0.45), 0 16px 30px rgba(158,31,99,0.18);
    }

    .team-label{
      margin-top:14px;
      font-size:20px;
      font-weight:900;
      color:var(--grape);
    }

    .controls-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .score-card{
      background:rgba(255,255,255,0.82);
      border-radius:24px;
      padding:18px 14px;
      box-shadow:0 10px 20px rgba(158,31,99,0.10);
      transition:0.3s;
    }

    .score-card.first-team{
      border:2px solid rgba(255,183,3,0.40);
    }

    .score-card.second-team{
      border:2px solid rgba(255,118,183,0.40);
    }

    .score-card.active{
      transform:translateY(-4px);
      box-shadow:0 0 0 5px rgba(255,255,255,0.45), 0 14px 24px rgba(158,31,99,0.15);
    }

    .team-name{
      color:var(--grape);
      font-size:21px;
      font-weight:900;
      margin-bottom:8px;
    }

    .score-actions{
      display:flex;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
    }

    .mini-btn{
      border:none;
      border-radius:999px;
      padding:9px 14px;
      font-family:'Cairo', sans-serif;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:0.25s;
    }

    .mini-btn:hover{
      transform:scale(1.05);
    }

    .plus-first{
      background:var(--amber);
      color:white;
    }

    .plus-second{
      background:var(--barbie);
      color:white;
    }

    .minus-btn{
      background:#f3e5ef;
      color:var(--grape);
    }

    .turn-btn{
      margin-top:18px;
      background:var(--peach);
      color:white;
      width:100%;
    }

    @keyframes twinkle{
      0%,100%{ transform:scale(1); opacity:0.8; }
      50%{ transform:scale(1.22); opacity:1; }
    }

    @keyframes floatUp{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-18px); }
    }

    @media (max-width:980px){
      .main-layout{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:600px){
      .top-bar{
        justify-content:center;
      }

      .sub{
        font-size:18px;
      }

      .memory-grid.easy{
        grid-template-columns:repeat(4, 70px);
      }

      .memory-grid.medium{
        grid-template-columns:repeat(4, 68px);
      }

      .memory-grid.hard{
        grid-template-columns:repeat(4, 64px);
      }

      .card{
        width:70px;
        height:70px;
      }

      .medium .card{
        width:68px;
        height:68px;
      }

      .hard .card{
        width:64px;
        height:64px;
      }

      .card-front{
        font-size:28px;
      }

      .hard .card-front{
        font-size:24px;
      }

      .controls-grid{
        grid-template-columns:1fr;
      }

      .arena{
        gap:16px;
      }

      .team-column-wrap{
        width:130px;
      }
    }
  </style>
</head>
<body>

  <div class="decor-circle c1"></div>
  <div class="decor-circle c2"></div>

  <div class="stars">
    <span class="star1">✦</span>
    <span class="star2">★</span>
    <span class="star3">✦</span>
    <span class="star4">★</span>
  </div>

  <div class="sparkles">
    <span class="spark1">✧</span>
    <span class="spark2">✧</span>
    <span class="spark3">✧</span>
  </div>

  <div class="balloons">
    <span class="balloon1">🎈</span>
    <span class="balloon2">🎈</span>
    <span class="balloon3">🎈</span>
  </div>

  <div class="page">
    <div class="top-bar">
      <button class="btn btn-reset" onclick="restartGame()">إعادة اللعبة 🔄</button>
      <a class="btn btn-back" href="الواجهة.html">رجوع للواجهة ✨</a>
    </div>

    <div class="game-card">
      <h1>تطابق الصور</h1>
      <p class="sub">ركّزي زين... يمكن الفوز يختبّي تحت أقرب بطاقة 👀✨</p>

      <div class="main-layout">
        <div class="board-section">
          <div class="level-badge" id="levelBadge">المستوى الحالي: سهل</div>
          <div class="memory-grid easy" id="memoryGrid"></div>
        </div>

        <div class="side-section">
          <div class="side-title">لوحة اللعب 🎯</div>

          <div class="turn-box" id="turnBox">الدور الحالي: الفريق الأول</div>

          <div class="pairs-box" id="pairsBox">الأزواج المكتشفة: 0</div>

          <div class="leader-card">
            <div class="lead-text" id="leadText">التعادل قائم 🤝</div>
          </div>

          <div class="arena">
            <div class="team-column-wrap">
              <div class="score-top" id="scoreFirst">0</div>
              <div class="column-track">
                <div class="team-column first" id="columnFirst"></div>
              </div>
              <div class="team-label">الفريق الأول</div>
            </div>

            <div class="team-column-wrap">
              <div class="score-top" id="scoreSecond">0</div>
              <div class="column-track">
                <div class="team-column second" id="columnSecond"></div>
              </div>
              <div class="team-label">الفريق الثاني</div>
            </div>
          </div>

          <div class="controls-grid">
            <div class="score-card first-team" id="cardFirst">
              <div class="team-name">الفريق الأول</div>
              <div class="score-actions">
                <button class="mini-btn plus-first" onclick="addPoint('first')">+1 نقطة</button>
                <button class="mini-btn minus-btn" onclick="removePoint('first')">-1</button>
              </div>
            </div>

            <div class="score-card second-team" id="cardSecond">
              <div class="team-name">الفريق الثاني</div>
              <div class="score-actions">
                <button class="mini-btn plus-second" onclick="addPoint('second')">+1 نقطة</button>
                <button class="mini-btn minus-btn" onclick="removePoint('second')">-1</button>
              </div>
            </div>
          </div>

          <button class="btn turn-btn" onclick="switchTurn()">تبديل الدور 🔁</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const levels = {
      easy: ["🍔","🍓","🐱","⚽","🎁","🌙"],
      medium: ["🍕","🦋","🎧","🎮","🧸","🌸","🦄","📱"],
      hard: ["🧠","🛸","🎯","🧩","🕶️","🦜","🍣","🚀","🎨","⌚"]
    };

    let currentLevel = "easy";
    let currentDeck = [];
    let flippedCards = [];
    let lockBoard = false;
    let matchedPairs = 0;
    let currentTurn = "first";

    let scoreFirst = 0;
    let scoreSecond = 0;

    const memoryGrid = document.getElementById("memoryGrid");
    const levelBadge = document.getElementById("levelBadge");
    const turnBox = document.getElementById("turnBox");
    const pairsBox = document.getElementById("pairsBox");

    const scoreFirstText = document.getElementById("scoreFirst");
    const scoreSecondText = document.getElementById("scoreSecond");
    const columnFirst = document.getElementById("columnFirst");
    const columnSecond = document.getElementById("columnSecond");
    const leadText = document.getElementById("leadText");
    const cardFirst = document.getElementById("cardFirst");
    const cardSecond = document.getElementById("cardSecond");

    function shuffleArray(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function getDeckByLevel(level){
      let symbols = [];

      if(level === "easy"){
        symbols = levels.easy;
      } else if(level === "medium"){
        symbols = levels.medium;
      } else {
        symbols = levels.hard;
      }

      const deck = [...symbols, ...symbols];
      shuffleArray(deck);
      return deck;
    }

    function restartGame(){
      scoreFirst = 0;
      scoreSecond = 0;
      updateScores();
      currentLevel = "easy";
      restartBoardOnly();
    }

    function restartBoardOnly(){
      currentDeck = getDeckByLevel(currentLevel);
      flippedCards = [];
      lockBoard = false;
      matchedPairs = 0;
      currentTurn = "first";

      levelBadge.textContent =
        currentLevel === "easy" ? "المستوى الحالي: سهل" :
        currentLevel === "medium" ? "المستوى الحالي: متوسط" :
        "المستوى الحالي: صعب";

      turnBox.textContent = "الدور الحالي: الفريق الأول";
      pairsBox.textContent = "الأزواج المكتشفة: 0";

      memoryGrid.className = `memory-grid ${currentLevel}`;
      memoryGrid.innerHTML = "";

      currentDeck.forEach((symbol, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.dataset.symbol = symbol;
        card.dataset.index = index;

        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back">؟</div>
            <div class="card-face card-front">${symbol}</div>
          </div>
        `;

        card.addEventListener("click", () => flipCard(card));
        memoryGrid.appendChild(card);
      });
    }

    function flipCard(card){
      if(lockBoard) return;
      if(card.classList.contains("flipped")) return;
      if(card.classList.contains("matched")) return;
      if(flippedCards.length === 2) return;

      card.classList.add("flipped");
      flippedCards.push(card);

      if(flippedCards.length === 2){
        checkMatch();
      }
    }

    function checkMatch(){
      const [first, second] = flippedCards;
      const isMatch = first.dataset.symbol === second.dataset.symbol;

      if(isMatch){
        first.classList.add("matched");
        second.classList.add("matched");

        matchedPairs++;
        pairsBox.textContent = `الأزواج المكتشفة: ${matchedPairs}`;
        flippedCards = [];

        const totalPairs = currentDeck.length / 2;
        if(matchedPairs === totalPairs){
          goToNextLevel();
        }
      } else {
        lockBoard = true;

        setTimeout(() => {
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          flippedCards = [];
          lockBoard = false;
          switchTurnAuto();
        }, 900);
      }
    }

    function goToNextLevel(){
      setTimeout(() => {
        if(currentLevel === "easy"){
          currentLevel = "medium";
          restartBoardOnly();
        } else if(currentLevel === "medium"){
          currentLevel = "hard";
          restartBoardOnly();
        } else {
          restartBoardOnly();
          turnBox.textContent = "خلصت الجولة! أعيدي اللعب إذا تبون 🔥";
        }
      }, 900);
    }

    function switchTurnAuto(){
      currentTurn = currentTurn === "first" ? "second" : "first";
      turnBox.textContent = currentTurn === "first"
        ? "الدور الحالي: الفريق الأول"
        : "الدور الحالي: الفريق الثاني";
    }

    function switchTurn(){
      if(lockBoard) return;
      currentTurn = currentTurn === "first" ? "second" : "first";
      turnBox.textContent = currentTurn === "first"
        ? "الدور الحالي: الفريق الأول"
        : "الدور الحالي: الفريق الثاني";
    }

    function addPoint(team){
      if(team === "first"){
        scoreFirst++;
      } else {
        scoreSecond++;
      }
      updateScores();
    }

    function removePoint(team){
      if(team === "first" && scoreFirst > 0){
        scoreFirst--;
      } else if(team === "second" && scoreSecond > 0){
        scoreSecond--;
      }
      updateScores();
    }

    function updateScores(){
      scoreFirstText.textContent = scoreFirst;
      scoreSecondText.textContent = scoreSecond;

      const firstHeight = 70 + (scoreFirst * 16);
      const secondHeight = 70 + (scoreSecond * 16);

      columnFirst.style.height = firstHeight + "px";
      columnSecond.style.height = secondHeight + "px";

      columnFirst.classList.remove("leader");
      columnSecond.classList.remove("leader");
      cardFirst.classList.remove("active");
      cardSecond.classList.remove("active");

      if(scoreFirst > scoreSecond){
        leadText.textContent = "الفريق الأول متقدم 🔥";
        columnFirst.classList.add("leader");
        cardFirst.classList.add("active");
      } else if(scoreSecond > scoreFirst){
        leadText.textContent = "الفريق الثاني متقدم 🔥";
        columnSecond.classList.add("leader");
        cardSecond.classList.add("active");
      } else {
        leadText.textContent = "التعادل قائم 🤝";
      }
    }

    updateScores();
    restartBoardOnly();
  </script>

</body>
</html>
